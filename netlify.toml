[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/admin-login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/verify-admin"
  to = "/.netlify/functions/verify-admin"
  status = 200

[[redirects]]
  from = "/api/set-soldout"
  to = "/.netlify/functions/set-soldout"
  status = 200

[[redirects]]
  from = "/api/get-soldout"
  to = "/.netlify/functions/get-soldout"
  status = 200
